services:
  moretea-openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moretea-openclaw
    # Host networking so the container can reach:
    #   - Ollama at 127.0.0.1:11434 (local LLM)
    #   - The SSH-tunneled MoreTea MCP endpoint at 127.0.0.1:8765/mcp
    # NOTE: with host networking, port 18790 is directly on the host
    network_mode: host
    volumes:
      # Knowledge base — bind mount so edits take effect without rebuilding the image
      - ./garage_knowledge:/root/robot
      # Agent workspace — bind mount for host visibility and git tracking
      - ./workspace:/root/.openclaw/workspace
      # Persist gateway identity and paired device state so browser/device tokens
      # do not drift every time the container is recreated.
      - moretea-openclaw-identity:/root/.openclaw/identity
      - moretea-openclaw-devices:/root/.openclaw/devices
    restart: unless-stopped

volumes:
  moretea-openclaw-identity:
    name: moretea-openclaw-identity
  moretea-openclaw-devices:
    name: moretea-openclaw-devices
